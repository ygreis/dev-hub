<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Ygreis Dev Hub | Libraries and Portfolio</title>
    <meta
      name="description"
      content="Public dev hub with landing pages, portfolio, and library documentation built as a single React SPA."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ygreis Dev Hub | Libraries and Portfolio" />
    <meta
      property="og:description"
      content="Public dev hub with landing pages and dedicated docs area for each library."
    />
    <meta property="og:url" content="https://ygreis.github.io/dev-hub/" />
    <meta property="og:site_name" content="Ygreis Dev Hub" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ygreis Dev Hub | Libraries and Portfolio" />
    <meta
      name="twitter:description"
      content="One SPA for portfolio pages, library docs, and examples on GitHub Pages."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script type="text/javascript">
      ;(function () {
        var storageKey = "dev-hub-theme"
        var savedTheme = localStorage.getItem(storageKey)
        var theme = "dark"

        if (savedTheme === "light" || savedTheme === "dark") {
          theme = savedTheme
        } else if (typeof window.matchMedia === "function") {
          try {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          } catch {
            theme = "dark"
          }
        }

        if (theme === "dark") {
          document.documentElement.classList.add("dark")
        } else {
          document.documentElement.classList.remove("dark")
        }
        document.documentElement.setAttribute("data-theme", theme)
      })()
    </script>

    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === "/") {
          const decoded = l.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?")
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
